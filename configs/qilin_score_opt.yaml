seed: 2026
device: cuda

data:
  processed_dir: data/processed/qilin_full_multimodal_meta
  train_file: train.parquet
  valid_file: valid.parquet
  test_file: test.parquet
  metadata_file: metadata.json
  max_history: 20
  batch_size: 2048
  num_workers: 0
  pin_memory: true
  fast_loader: true
  request_preserving_train: true

model:
  name: HeteroIntentPLE
  ranker: ple
  embed_dim: 64
  hidden_dim: 512
  dropout: 0.15
  max_position: 200
  transformer_layers: 2
  transformer_heads: 4
  shared_experts: 8
  task_experts: 4
  ple_layers: 3
  use_graph_embedding: true
  graph_embedding_trainable: false
  disabled_modalities: []
  enable_intent_heads: false
  use_rank_head: true
  rank_score_blend: 0.5

loss:
  task_weights:
    click: 0.2
    collect: 0.45
    share: 0.35
  positive_weights:
    click: 1.0
    collect: 8.0
    share: 12.0
  negative_weights:
    click: 1.0
    collect: 0.35
    share: 0.25
  bpr_weight: 0.05
  task_bpr_weight: 0.03
  bpr_max_groups: 128
  bpr_max_pairs_per_group: 64
  listwise_weight: 0.03
  collect_listwise_weight: 0.04
  share_listwise_weight: 0.04
  listwise_max_groups: 64
  listwise_temperature: 0.8
  transition_weight: 0.0
  type_transition_weight: 0.0
  taxonomy_transition_weight: 0.0
  contrastive_weight: 0.0
  l2_weight: 0.0001
  focal_gamma: 1.5

train:
  epochs: 30
  lr: 0.0003
  weight_decay: 0.0001
  grad_clip: 5.0
  patience: 8
  min_epochs: 12
  amp: true
  output_dir: outputs/qilin_score_opt

evaluation:
  topk: 20
  enable_dynamic_intent_metrics: true
  score_weights:
    click: 0.3
    collect: 0.4
    share: 0.3
