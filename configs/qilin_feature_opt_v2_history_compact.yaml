seed: 2026
device: cuda
data:
  processed_dir: data/processed/qilin_v2
  train_file: train.parquet
  valid_file: valid.parquet
  test_file: test.parquet
  metadata_file: metadata.json
  max_history: 20
  batch_size: 3072
  eval_batch_size: 8192
  num_workers: 0
  pin_memory: true
  fast_loader: true
  eval_fast_loader: true
  request_preserving_train: true
model:
  name: HeteroIntentPLE
  ranker: ple
  embed_dim: 64
  hidden_dim: 512
  dropout: 0.15
  max_position: 200
  transformer_layers: 2
  transformer_heads: 4
  shared_experts: 8
  task_experts: 4
  ple_layers: 3
  use_graph_embedding: true
  graph_embedding_trainable: false
  enable_intent_heads: true
  enable_aux_heads: true
  use_computed_cross: true
  use_text_fusion_gate: true
  use_query_interaction: true
  use_cold_stage_gate: true
  use_history_semantic: true
  task_text_residual_weight: 0.1
loss:
  task_weights:
    click: 0.3
    collect: 0.4
    share: 0.3
  positive_weights:
    click: 1.0
    collect: 6.0
    share: 8.0
  negative_weights:
    click: 1.0
    collect: 0.7
    share: 0.6
  bpr_weight: 0.02
  task_bpr_weight: 0.008
  hard_bpr_weight: 0.01
  hard_task_bpr_weight: 0.004
  bpr_max_groups: 128
  bpr_max_pairs_per_group: 64
  listwise_weight: 0.012
  hard_listwise_weight: 0.01
  rank_loss_min_group_size: 1
  hard_rank_loss_min_group_size: 20
  collect_listwise_weight: 0.012
  share_listwise_weight: 0.008
  hard_collect_listwise_weight: 0.006
  hard_share_listwise_weight: 0.004
  topk_coverage_weight: 0.02
  topk_coverage_max_groups: 64
  topk_coverage_temperature: 0.05
  topk_coverage_margin: 0.0
  listwise_max_groups: 64
  listwise_temperature: 0.9
  type_transition_weight: 0.008
  taxonomy_transition_weight: 0.001
  aux_like_weight: 0.02
  aux_comment_weight: 0.01
  aux_page_time_weight: 0.01
  aux_like_pos_weight: 4.0
  aux_comment_pos_weight: 6.0
  l2_weight: 0.0001
  focal_gamma: 1.5
train:
  epochs: 15
  lr: 0.0003
  weight_decay: 0.0001
  grad_clip: 5.0
  patience: 3
  min_epochs: 4
  amp: true
  compile: false
  output_dir: outputs\qilin_intend_transition
evaluation:
  topk: 20
  enable_dynamic_intent_metrics: true
  selection_metric: native_selection_score
  score_weights:
    click: 0.3
    collect: 0.4
    share: 0.3
