seed: 2026
device: cuda

data:
  processed_dir: data/processed/qilin_full
  train_file: train.parquet
  valid_file: valid.parquet
  test_file: test.parquet
  metadata_file: metadata.json
  max_history: 20
  batch_size: 2048
  num_workers: 0
  pin_memory: true
  fast_loader: true

model:
  name: HeteroIntentPLE
  ranker: ple
  embed_dim: 64
  hidden_dim: 128
  dropout: 0.1
  max_position: 200
  transformer_layers: 2
  transformer_heads: 4
  shared_experts: 4
  task_experts: 2
  ple_layers: 2
  use_graph_embedding: true
  graph_embedding_trainable: false

loss:
  click_weight: 0.3
  collect_weight: 0.4
  share_weight: 0.3
  bpr_weight: 0.0
  transition_weight: 0.0
  contrastive_weight: 0.0
  l2_weight: 0.0001
  focal_gamma: 1.5

train:
  epochs: 30
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 5.0
  patience: 5
  amp: true
  output_dir: outputs/qilin_full

evaluation:
  topk: 20
  score_weights:
    click: 0.3
    collect: 0.4
    share: 0.3